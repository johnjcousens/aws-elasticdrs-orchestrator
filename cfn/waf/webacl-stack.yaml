AWSTemplateFormatVersion: '2010-09-09'
Description: |
  WAF Stack - AWS Web Application Firewall for CloudFront protection with
  rate limiting and AWS Managed Rule Sets.

# =============================================================================
# PARAMETERS
# =============================================================================

Parameters:
  ProjectName:
    Type: String
    Description: 'Project name for resource naming'

  Environment:
    Type: String
    Description: 'Environment name (dev, test, staging, prod)'

  WafRuleAction:
    Type: String
    Default: Count
    AllowedValues:
      - Count
      - Block
    Description: >-
      Action for the rate-limit and AWS managed rule groups. "Count" observes
      and logs matches without blocking (safe first deploy, no lockout risk).
      "Block" enforces the rules. Deploy with Count first, validate via WAF
      sampled requests / CloudWatch metrics, then switch to Block.

# =============================================================================
# CONDITIONS
# =============================================================================

Conditions:
  # When Block: rate rule blocks and managed groups use their own (block)
  # actions. When Count: every rule only counts, so nothing is blocked.
  IsBlockMode: !Equals [!Ref WafRuleAction, 'Block']

# =============================================================================
# RESOURCES
# =============================================================================

Resources:
  WebACL:
    Type: AWS::WAFv2::WebACL
    DeletionPolicy: Delete
    Properties:
      Name: !Sub '${ProjectName}-waf-${Environment}'
      Description: !Sub 'WAF WebACL for ${ProjectName} CloudFront distribution'
      Scope: CLOUDFRONT
      DefaultAction:
        Allow: {}
      VisibilityConfig:
        SampledRequestsEnabled: true
        CloudWatchMetricsEnabled: true
        MetricName: !Sub '${ProjectName}-waf-${Environment}'
      Rules:
        - Name: RateLimitRule
          Priority: 0
          Action: !If [IsBlockMode, { Block: {} }, { Count: {} }]
          Statement:
            RateBasedStatement:
              Limit: 2000
              AggregateKeyType: IP
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: !Sub '${ProjectName}-rate-limit'

        - Name: AWSManagedRulesAmazonIpReputationList
          Priority: 1
          OverrideAction: !If [IsBlockMode, { None: {} }, { Count: {} }]
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesAmazonIpReputationList
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: !Sub '${ProjectName}-ip-reputation'

        - Name: AWSManagedRulesCommonRuleSet
          Priority: 2
          OverrideAction: !If [IsBlockMode, { None: {} }, { Count: {} }]
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesCommonRuleSet
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: !Sub '${ProjectName}-common-rules'

        - Name: AWSManagedRulesKnownBadInputsRuleSet
          Priority: 3
          OverrideAction: !If [IsBlockMode, { None: {} }, { Count: {} }]
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesKnownBadInputsRuleSet
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: !Sub '${ProjectName}-bad-inputs'

# =============================================================================
# OUTPUTS
# =============================================================================

Outputs:
  WebACLArn:
    Description: 'WAF Web ACL ARN'
    Value: !GetAtt WebACL.Arn

  WebACLId:
    Description: 'WAF Web ACL ID'
    Value: !Ref WebACL
